<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- Upward trending chart -->
  <g fill="none" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Chart baseline / axes -->
    <line x1="28" y1="98" x2="28" y2="38"/>
    <line x1="28" y1="98" x2="100" y2="98"/>
    <!-- Trend line going up -->
    <polyline points="34,88 50,78 62,70 74,52 88,36" stroke-width="4.5"/>
    <!-- Chart bars -->
    <rect x="36" y="78" width="10" height="20" rx="2" fill="white" opacity="0.4" stroke="none"/>
    <rect x="52" y="68" width="10" height="30" rx="2" fill="white" opacity="0.5" stroke="none"/>
    <rect x="68" y="56" width="10" height="42" rx="2" fill="white" opacity="0.6" stroke="none"/>
    <rect x="84" y="42" width="10" height="56" rx="2" fill="white" opacity="0.7" stroke="none"/>
  </g>
  <!-- Lightning bolt -->
  <g fill="white" transform="translate(80, 18)">
    <polygon points="14,0 4,16 12,16 6,30 24,12 16,12 22,0"/>
  </g>
</svg>